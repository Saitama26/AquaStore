services:
  # Шаг 1: Запуск MySQL сервера
  mysql:
    image: mysql:8.0
    container_name: aquastore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-sqlPassword123}
      MYSQL_DATABASE: ${DB_NAME:-aquastore}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-sqlPassword123}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - aquastore-network
    command: --default-authentication-plugin=mysql_native_password

  # Шаг 2: Инициализация БД (создание БД и пользователя)
  db-init:
    image: mysql:8.0
    container_name: aquastore-db-init
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-sqlPassword123}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${DB_NAME:-aquastore}
    volumes:
      - ./scripts/wait-for-mysql.sh:/wait-for-mysql.sh:ro
    networks:
      - aquastore-network
    entrypoint: ["/bin/bash", "/wait-for-mysql.sh"]
    restart: "no"

  # Шаг 3: Запуск API приложения
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aquastore-api
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    environment:
      # Database
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-aquastore}
      DB_USER: ${DB_USER:-aquastore_user}
      DB_PASSWORD: ${DB_PASSWORD:-sqlPassword123}
      MYSQL_VERSION: "8.0.0-mysql"
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-that-should-be-at-least-32-characters-long-change-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-AquaStore}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-AquaStore.Client}
      
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:80}
      
      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      # Email
      EmailSettings__Host: ${EMAIL_HOST}
      EmailSettings__Port: ${EMAIL_PORT}
      EmailSettings__EnableSsl: ${EMAIL_ENABLE_SSL}
      EmailSettings__Username: ${EMAIL_USERNAME}
      EmailSettings__Password: ${EMAIL_PASSWORD}
      EmailSettings__FromEmail: ${EMAIL_FROM_EMAIL}
      EmailSettings__FromName: ${EMAIL_FROM_NAME:-AquaStore}
    ports:
      - "${API_PORT:-5000}:8080"
    networks:
      - aquastore-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Шаг 4: Запуск Frontend (Production)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aquastore-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      API_BASE_URL: http://api:8080
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - frontend_keys:/app/DataProtection-Keys
    networks:
      - aquastore-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
    driver: local
  frontend_keys:
    driver: local

networks:
  aquastore-network:
    driver: bridge
